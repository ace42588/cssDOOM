# System of Record: cssDOOM game-state events (Event Push).
#
# SGNL's SCIM 2.0 Entity Push only accepts `/Users` and `/Groups`, so
# dynamic in-world state (doors, lifts, crushers, pickups, keys, AI
# actors) cannot live in the SCIM SoR. Instead the cssDOOM server POSTs
# discrete state-change events to the Event Push endpoint SGNL issues
# at SoR creation time:
#
#   POST https://{client}.sgnlapis.cloud/events/custom/v1/{datasourceId}
#   Authorization: Bearer <SGNL-issued token>
#   Content-Type: application/json
#   Body: { "events": [ { "type": "...", "subject": "...", ... }, ... ] }
#
# Each entity below declares:
#   • `externalId` — literal value of `$.type` that binds events to
#     this entity (e.g. `DoorState`). Event-type names are dot-free so
#     policy expressions `<entity>.<attribute>` parse unambiguously.
#   • `pushExternalId: $.type` — where the binding value lives.
#   • A unique `$.id` per event (UUID) and an indexed `$.subject` that
#     matches the canonical asset id used by the SCIM User / map adapter
#     ids (door:<MAP>:<sectorIndex>, actor:<MAP>:<mapThingIndex>, …).
#
# Rate limiting: the cssDOOM server coalesces dirty entities at 1Hz and
# dedupes by content hash — no state change means no event POST.

displayName: "cssDOOM game-state events"
icon: ""
description: >-
  Discrete state-change events pushed from the cssDOOM server for every
  in-world entity the access engine cares about. `$.subject` uses the
  same canonical id as the SCIM `User.userName` join key and the SGNL
  map adapter, so policies can correlate identity, static map, and
  dynamic state without bespoke joins.
type: "CssDoomEvents-1.0.0"
deliveryMethod: eventPush
pushType: Custom
pushEventsPath: $.events[*]

entities:
  # ─── Door ────────────────────────────────────────────────────────────
  DoorState:
    displayName: Door state
    externalId: DoorState
    pushExternalId: $.type
    description: Open / passable / key-required / pending-request transitions on a door sector.
    attributes:
      - name: id
        externalId: $.id
        type: String
        indexed: true
        uniqueId: true
      - name: subject
        externalId: $.subject
        type: String
        indexed: true
      - name: timestamp
        externalId: $.timestamp
        type: DateTime
        indexed: true
      - name: mapName
        externalId: $.mapName
        type: String
        indexed: true
      - name: sectorIndex
        externalId: $.sectorIndex
        type: Int64
        indexed: true
      - name: open
        externalId: $.open
        type: Bool
        indexed: true
      - name: passable
        externalId: $.passable
        type: Bool
        indexed: true
      - name: keyRequired
        externalId: $.keyRequired
        type: String
        indexed: true
      - name: pendingRequests
        externalId: $.pendingRequests
        type: Int64

  # ─── Lift ────────────────────────────────────────────────────────────
