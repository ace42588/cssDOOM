relationships:
  # Internal join: a door's `keyRequired` color matches key-pickup
  # events carrying that color. `collectedBy` on pickup/key events
  # joins the cssDOOM SCIM User SoR (`User.userName`) at policy time —
  # cross-SoR joins live in the policy, not here.
  DoorKey:
    name: DoorKey
    displayName: Door requires key color
    fromAttribute: DoorState.$.keyRequired
    toAttribute: KeyState.$.color
