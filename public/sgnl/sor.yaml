relationships:
  LinedefStartVertex:
    name: LinedefStartVertex
    displayName: Linedef start vertex
    fromAttribute: linedefs.startVertex
    toAttribute: vertices.index
  LinedefEndVertex:
    name: LinedefEndVertex
    displayName: Linedef end vertex
    fromAttribute: linedefs.endVertex
    toAttribute: vertices.index
  SidedefSector:
    name: SidedefSector
    displayName: Sidedef to sector
    fromAttribute: sidedefs.sectorIndex
    toAttribute: sectors.index
  WallSector:
    name: WallSector
    displayName: Wall to sector
    fromAttribute: walls.sectorIndex
    toAttribute: sectors.index
  WallLinedef:
    name: WallLinedef
    displayName: Wall to linedef
    fromAttribute: walls.linedefIndex
    toAttribute: linedefs.index
