# System of Record template: cssDOOM map JSON ingested via the in-repo gRPC adapter.
# `type` must match the custom adapter registration in your SGNL tenant.
# `adapterConfig` is base64("{}") — global-only; do not encode a map name (maps come from MAPS_DIR / public/maps).

displayName: cssDOOM maps
icon: ""
description: DOOM map geometry and gameplay objects from native JSON (one file per map). Map is the root entity; arrays in JSON are child entities nested under each Map during sync.
address: "127.0.0.1:8080"
defaultSyncFrequency: HOURLY
defaultSyncMinInterval: 1
defaultApiCallFrequency: SECONDLY
defaultApiCallMinInterval: 1
type: "CssDoomMap-1.0.0"
adapterConfig: "e30="
auth:
  - bearer:
      authToken: "{{Input Required: Bearer token (same value as gRPC metadata key token)}}"

entities:
  Map:
    displayName: Map
    externalId: map
    description: Root map document (vertices, linedefs, sectors, walls, …).
    syncFrequency: HOURLY
    syncMinInterval: 1
    apiCallFrequency: SECONDLY
    apiCallMinInterval: 1
    pageSize: 10
    pagesOrderedById: true
    attributes:
      - name: name
        externalId: name
        type: String
        indexed: true
        uniqueId: true
      - name: playerStartX
        externalId: playerStart.x
        type: Double
        indexed: false
      - name: playerStartY
        externalId: playerStart.y
        type: Double
        indexed: false
      - name: playerStartAngle
        externalId: playerStart.angle
        type: Double
        indexed: false
      - name: playerStartFloorHeight
        externalId: playerStart.floorHeight
        type: Int64
        indexed: false
      - name: boundsMinX
        externalId: bounds.minX
        type: Double
        indexed: false
      - name: boundsMaxX
        externalId: bounds.maxX
        type: Double
        indexed: false
      - name: boundsMinY
        externalId: bounds.minY
        type: Double
        indexed: false
      - name: boundsMaxY
        externalId: bounds.maxY
        type: Double
        indexed: false

  vertices:
    displayName: Vertices
    externalId: vertices
    description: Vertex coordinates (index = array position in map JSON).
    parent: map
    syncFrequency: HOURLY
    syncMinInterval: 1
    apiCallFrequency: SECONDLY
    apiCallMinInterval: 1
    pageSize: 500
    pagesOrderedById: true
    attributes:
      - name: index
        externalId: index
        type: Int64
        indexed: true
        uniqueId: true
      - name: x
        externalId: x
        type: Int64
        indexed: true
      - name: y
        externalId: y
        type: Int64
        indexed: true

  linedefs:
    displayName: Linedefs
    externalId: linedefs
    description: Linedefs between vertex indices.
    parent: map
    syncFrequency: HOURLY
    syncMinInterval: 1
    apiCallFrequency: SECONDLY
    apiCallMinInterval: 1
    pageSize: 500
    pagesOrderedById: true
    attributes:
      - name: index
        externalId: index
        type: Int64
        indexed: true
        uniqueId: true
      - name: startVertex
        externalId: startVertex
        type: Int64
        indexed: true
      - name: endVertex
        externalId: endVertex
        type: Int64
        indexed: true
      - name: flags
        externalId: flags
        type: Int64
        indexed: false
      - name: specialType
        externalId: specialType
        type: Int64
        indexed: false
      - name: sectorTag
        externalId: sectorTag
        type: Int64
        indexed: true
      - name: frontSidedef
        externalId: frontSidedef
        type: Int64
        indexed: true
      - name: backSidedef
        externalId: backSidedef
        type: Int64
        indexed: true

  sidedefs:
