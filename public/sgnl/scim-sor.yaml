# System of Record: cssDOOM player sessions (SCIM 2.0 entity push).
#
# SGNL's SCIM 2.0 Entity Push only accepts `/Users` and `/Groups`. So
# this SoR pushes exactly one thing: a SCIM User per connected player
# session. Everything else about the running game (doors, lifts,
# crushers, pickups, keys, AI actors) is pushed via the Event Push SoR
# in events-sor.yaml — SGNL cannot host custom SCIM resource types.
#
# Wire:
#   POST   <address>/Users                     # create on first push
#   PUT    <address>/Users/{id}                # subsequent updates
#   DELETE <address>/Users/{id}                # on session drop
#
# `userName` is the canonical asset id the SGNL map adapter would
# reference for this player (player:<sessionId>), so decision engines
# can cross-reference the SCIM User with game-state events (subject =
# player:<sessionId>) without an explicit join.
#
# Conventions:
#   • One uniqueId attribute per entity (`id`, mapped to SCIM resource id).
#   • Nested attributes use JSONPath (`$.position.x`); top-level SCIM
#     fields use the bare name.
#   • `pagesOrderedById: false` — SCIM push doesn't guarantee ordering.

displayName: "cssDOOM player sessions (SCIM)"
icon: ""
description: >-
  One SCIM 2.0 User per connected cssDOOM player session. Pushed from
  the cssDOOM server on every meaningful state change (health, ammo,
  keys, powerups, map transition). `userName` matches the subject id
  used by the cssDOOM events SoR, so policies can join on
  `User.userName == <event>.subject`.
type: "SCIM2.0-1.0.0"
address: "{{Input Required: SCIM 2.0 base URL; SGNL appends /Users and /Groups}}"
deliveryMethod: entityPush
pushType: SCIM2.0
auth:
  - bearer:
      authToken: "{{Input Required: Bearer token for SCIM push endpoint}}"

entities:
  # ─── User (player session) ───────────────────────────────────────────
  User:
    displayName: Users (player sessions)
    externalId: User
    pushExternalId: User
    description: SCIM User resource per connected player session. userName = player:<sessionId>.
    pageSize: 100
    pagesOrderedById: false
    attributes:
      - name: id
        externalId: id
        pushExternalId: id
        type: String
        indexed: true
        uniqueId: true
      - name: schemas
        externalId: schemas
        pushExternalId: schemas
        type: String
        list: true
      - name: userName
        externalId: userName
        pushExternalId: userName
        type: String
        indexed: true
      - name: active
        externalId: active
        pushExternalId: active
        type: Bool
        indexed: true
      - name: sessionId
        externalId: sessionId
        pushExternalId: sessionId
        type: String
        indexed: true
      - name: correlationId
        externalId: correlationId
        pushExternalId: correlationId
        type: String
        indexed: true
      - name: mapName
        externalId: mapName
        pushExternalId: mapName
        type: String
        indexed: true
      - name: displayName
        externalId: displayName
        pushExternalId: displayName
        type: String
      - name: positionX
        externalId: $.position.x
        pushExternalId: $.position.x
        type: Double
      - name: positionY
        externalId: $.position.y
        pushExternalId: $.position.y
        type: Double
      - name: positionZ
        externalId: $.position.z
        pushExternalId: $.position.z
        type: Double
      - name: positionAngle
        externalId: $.position.angle
        pushExternalId: $.position.angle
        type: Double
      - name: health
        externalId: $.vitals.health
        pushExternalId: $.vitals.health
        type: Int64
        indexed: true
      - name: armor
        externalId: $.vitals.armor
        pushExternalId: $.vitals.armor
        type: Int64
      - name: armorType
        externalId: $.vitals.armorType
        pushExternalId: $.vitals.armorType
        type: Int64
      - name: isDead
        externalId: $.vitals.isDead
        pushExternalId: $.vitals.isDead
        type: Bool
        indexed: true
      - name: ammoBullets
        externalId: $.ammo.bullets
        pushExternalId: $.ammo.bullets
        type: Int64
      - name: ammoShells
        externalId: $.ammo.shells
        pushExternalId: $.ammo.shells
        type: Int64
      - name: ammoRockets
        externalId: $.ammo.rockets
        pushExternalId: $.ammo.rockets
        type: Int64
      - name: ammoCells
        externalId: $.ammo.cells
        pushExternalId: $.ammo.cells
        type: Int64
      - name: maxAmmoBullets
        externalId: $.maxAmmo.bullets
        pushExternalId: $.maxAmmo.bullets
        type: Int64
      - name: maxAmmoShells
        externalId: $.maxAmmo.shells
        pushExternalId: $.maxAmmo.shells
        type: Int64
      - name: maxAmmoRockets
        externalId: $.maxAmmo.rockets
        pushExternalId: $.maxAmmo.rockets
        type: Int64
      - name: maxAmmoCells
        externalId: $.maxAmmo.cells
        pushExternalId: $.maxAmmo.cells
        type: Int64
      - name: hasBackpack
        externalId: $.inventory.hasBackpack
        pushExternalId: $.inventory.hasBackpack
        type: Bool
      - name: currentWeapon
        externalId: $.inventory.currentWeapon
        pushExternalId: $.inventory.currentWeapon
        type: Int64
      - name: ownedWeapons
        externalId: $.inventory.ownedWeapons
        pushExternalId: $.inventory.ownedWeapons
        type: Int64
        list: true
      - name: collectedKeys
        externalId: $.inventory.collectedKeys
        pushExternalId: $.inventory.collectedKeys
        type: String
        list: true
        indexed: true
      - name: updatedAt
        externalId: updatedAt
        pushExternalId: updatedAt
        type: DateTime
        indexed: true

  # ─── Powerup (nested child of User) ──────────────────────────────────
  # Multi-valued nested attribute modelled as a child entity per SGNL's
  # SCIM Push template convention.
  Powerup:
    parent: User
    displayName: Player Powerups
    externalId: powerups
    pushExternalId: powerups
    description: Active powerup with remaining duration. Multi-valued child of User.
    pageSize: 50
    pagesOrderedById: false
    attributes:
      - name: name
        externalId: name
        pushExternalId: name
        type: String
        indexed: true
        uniqueId: true
      - name: remainingSeconds
        externalId: remainingSeconds
        pushExternalId: remainingSeconds
        type: Double

relationships:
  # Multi-valued nested attribute `powerups` on User is exposed as the
  # Powerup child entity; SGNL requires the explicit parent/child link.
  ParentOfPowerup:
    childEntity: Powerup
