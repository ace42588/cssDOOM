        indexed: true
      - name: x
        externalId: x
        type: Double
        indexed: false
      - name: y
        externalId: y
        type: Double
        indexed: false
      - name: closedHeight
        externalId: closedHeight
        type: Int64
        indexed: false
      - name: openHeight
        externalId: openHeight
        type: Int64
        indexed: false
      - name: floorHeight
        externalId: floorHeight
        type: Int64
        indexed: false
      - name: keyRequired
