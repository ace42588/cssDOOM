# System of Record template: cssDOOM map JSON ingested via the in-repo gRPC adapter.
# `type` must match the custom adapter registration in your SGNL tenant.
# `adapterConfig` is base64("{}") — global-only; do not encode a map name (maps come from MAPS_DIR / public/maps).
#
# The adapter returns a curated, access-decision-oriented view of each map:
# only interactable entities (doors, switches, keys, pickups, exits, lifts,
# teleporters, crushers) — not the raw geometry. Each row carries a stable
# `id` of the form `<kind>:<MAP>:<key>` that matches the `assetId` the
# engine sends to SGNL Access Evaluations, so decision requests correlate
# directly to the SoR entity.

displayName: cssDOOM maps
icon: ""
description: Curated DOOM map interactables (doors, switches, keys, pickups, exits, lifts, teleporters, crushers). Map is the root entity; each child carries a stable `id` matching the assetId used in access evaluations.
address: "127.0.0.1:8080"
defaultSyncFrequency: HOURLY
defaultSyncMinInterval: 1
defaultApiCallFrequency: SECONDLY
defaultApiCallMinInterval: 1
type: "CssDoomMap-1.0.0"
adapterConfig: "e30="
auth:
  - bearer:
      authToken: "{{Input Required: Bearer token (same value as gRPC metadata key token)}}"

entities:
  Map:
    displayName: Map
    externalId: map
    description: Root map document (name, player start, bounds).
    syncFrequency: HOURLY
    syncMinInterval: 1
    apiCallFrequency: SECONDLY
    apiCallMinInterval: 1
    pageSize: 10
    pagesOrderedById: true
    attributes:
      - name: name
        externalId: name
        type: String
        indexed: true
        uniqueId: true
      - name: playerStartX
        externalId: playerStart.x
        type: Double
        indexed: false
      - name: playerStartY
        externalId: playerStart.y
        type: Double
        indexed: false
      - name: playerStartAngle
        externalId: playerStart.angle
        type: Double
        indexed: false
      - name: playerStartFloorHeight
        externalId: playerStart.floorHeight
        type: Int64
        indexed: false
      - name: boundsMinX
        externalId: bounds.minX
        type: Double
        indexed: false
      - name: boundsMaxX
        externalId: bounds.maxX
        type: Double
        indexed: false
      - name: boundsMinY
        externalId: bounds.minY
        type: Double
        indexed: false
      - name: boundsMaxY
        externalId: bounds.maxY
        type: Double
        indexed: false

  doors:
    displayName: Doors
    externalId: doors
    description: Door specials with centroid location and key requirement. `id` = door:<MAP>:<sectorIndex>.
    parent: map
    syncFrequency: HOURLY
