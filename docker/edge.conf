# Unified HTTP entry for reverse proxies (PingAccess, Caddy, etc.):
#   /healthz -> game (authoritative liveness)
#   /ws      -> game WebSocket
#   /mcp     -> game MCP Streamable HTTP (POST + SSE)
#   /*       -> static web (nginx)
#
# Use Docker embedded DNS + variables in proxy_pass so hostnames are
# re-resolved when `web` / `game` containers are recreated (otherwise
# nginx caches the old IP at startup and returns 502 until `edge` restarts).

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    server_tokens off;

    # Docker user-defined bridge DNS (see `docker network inspect`)
    resolver       127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location = /healthz {
        set $game_upstream game:8787;
        proxy_pass http://$game_upstream/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /ws {
        set $game_upstream game:8787;
        proxy_pass http://$game_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # MCP Streamable HTTP transport: POST for JSON-RPC, GET for long-lived
    # SSE streams, DELETE to end a session. SSE requires proxy_buffering off
    # so tokens reach the client immediately, and a long read timeout so
    # idle streams are not reaped mid-session.
    location = /mcp {
        set $game_upstream game:8787;
        proxy_pass http://$game_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        set $web_upstream web:80;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;
}
