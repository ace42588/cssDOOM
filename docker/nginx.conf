# Static asset server for the Vite-built cssDOOM client.
#
# This sits behind an external reverse proxy that already terminates TLS
# and routes `/ws` + `/healthz` to the multiplayer server. We just need
# to serve `dist/` correctly, with sane caching for hashed assets and
# explicit no-cache for the entry HTML.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root        /usr/share/nginx/html;
    index       index.html;

    # Hide nginx version in `Server:` header.
    server_tokens off;

    # Container-local liveness; the external proxy should hit `/healthz`
    # on the multiplayer server, not on this one.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Vite emits hashed filenames under /assets/ — safe to cache hard.
    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Map JSON / SGNL fixtures change with deploys; let the upstream
    # proxy or browser revalidate cheaply.
    location ~ ^/(maps|sgnl)/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Entry document must always reflect the latest build.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Everything else: serve the file or fall through to index.html so
    # any future client-side routing still works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compress text-y payloads in flight.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;
}
